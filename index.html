  <script src="https://cdn.jsdelivr.net/npm/swiper@12.1.0/swiper-bundle.min.js"></script>
  <script>
    //=======swiper
    const swiper = new Swiper('.swiper', {
      loop: true,
      slidesPerView: 1.6, //スマホ用 表示枚数
      centeredSlides: true,
      speed: 400,

      pagination: {
        el: '.swiper-pagination',
        clickable: true,
      },

      navigation: {
        nextEl: '.swiper-button-next',
        prevEl: '.swiper-button-prev',
      },

      autoplay: {
        delay: 6000,
        disableOnInteraction: false,
      },

      breakpoints: {
        900: {
          slidesPerView: 5, //PC・タブレット用 表示枚数
        }
      }
    });


    //=======モーダル
    const modal = document.getElementById('modal');
    const modalTitle = document.querySelector('.modal-title');
    const modalBody = document.querySelector('.modal-body');
    const closeBtn = document.querySelector('.modal-close');
    const overlay = document.querySelector('.modal-overlay');

    document.querySelectorAll('.swiper-slide').forEach(btn => {
      btn.addEventListener('click', (e) => {

        e.stopPropagation();

        const slide = btn.closest('.swiper-slide');

        modalTitle.textContent = slide.dataset.title;
        modalBody.innerHTML = ""; // ← 一旦リセット

        const images = slide.dataset.img.split(",");
        const text = slide.dataset.text;

        const imageWrapper = document.createElement("div");
        imageWrapper.classList.add("modal-images");

        images.forEach(src => {
          const img = document.createElement("img");
          img.src = src.trim();
          img.classList.add("modal-img");
          imageWrapper.appendChild(img);
        });

        modalBody.appendChild(imageWrapper);

        const textWrapper = document.createElement("div");
        textWrapper.classList.add("modal-text");
        textWrapper.innerHTML = text;
        modalBody.appendChild(textWrapper);

        modal.classList.add('is-open');
        swiper.autoplay.stop(); // Swiper停止

        // 表示後にスクロール位置をリセット
        requestAnimationFrame(() => {
          modalBody.scrollTop = 0;
        });
      });
    });

    function closeModal() {
      modal.classList.remove('is-open');
      swiper.autoplay.start(); // Swiper再開
    }

    closeBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', closeModal);

  </script>
